<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 52" role="img">
  <title>Rixora — AI Career and Study Hub</title>
  <desc>Rixora logo with geometric R mark and wordmark</desc>
  <defs>
    <linearGradient id="rixGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- Icon mark: rounded square with R letterform -->
  <rect x="0" y="4" width="44" height="44" rx="10" fill="url(#rixGrad)"/>
  <!-- R letterform: vertical stroke + arch + diagonal leg -->
  <path
    d="M10 13 L10 39
       M10 13 L28 13 Q34 13 34 20 Q34 27 28 27 L10 27
       M22 27 L34 39"
    stroke="#ffffff"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- Wordmark: Rix (bold) + ora (light) -->
  <text
    x="54" y="30"
    font-family="Inter,system-ui,sans-serif"
    font-size="24"
    font-weight="800"
    fill="#7C3AED"
    letter-spacing="-0.5"
  >Rix</text>
  <text
    x="96" y="30"
    font-family="Inter,system-ui,sans-serif"
    font-size="24"
    font-weight="300"
    fill="#4F46E5"
    letter-spacing="-0.5"
  >ora</text>
  <!-- Sub-label -->
  <text
    x="54" y="44"
    font-family="Inter,system-ui,sans-serif"
    font-size="8"
    font-weight="500"
    fill="#9CA3AF"
    letter-spacing="1.5"
  >AI CAREER · STUDY HUB</text>
</svg>
